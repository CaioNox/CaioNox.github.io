<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  SLIDE 15 — Tipos de manifestações distribuídos por mês
  ╠══════════════════════════════════════════════════════════════╣
  ║  O QUE ATUALIZAR A CADA TRIMESTRE:
  ║  Atualizar: série mensal por tipo de manifestação
  ╚══════════════════════════════════════════════════════════════╝
-->

<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Tipos de Manifestações por Mês - Relatório Trimestral Ouvidoria ANTAQ</title>
  <link rel="icon" type="image/png"
    href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&amp;family=Open+Sans:ital,wght@0,400;0,600;1,400&amp;display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    html {
      font-size: 26px;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      overflow: hidden;
    }

    .slide-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
      overflow: hidden;
      font-family: 'Open Sans', sans-serif;
    }

    .font-montserrat {
      font-family: 'Montserrat', sans-serif;
    }

    .text-brand-primary {
      color: #103050;
    }

    .text-brand-secondary {
      color: #0070C0;
    }

    .bg-brand-secondary {
      background-color: #0070C0;
    }

    .top-accent {
      height: 8px;
      background-color: #103050;
      width: 100%;
    }

    .top-accent-secondary {
      height: 4px;
      background-color: #0070C0;
      width: 100%;
    }

    /* ===== Interatividade ===== */
    .chart-card {
      transition: transform .28s cubic-bezier(.2, .7, .3, 1), box-shadow .28s ease, border-color .28s ease;
    }

    .chart-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 42px -12px rgba(16, 48, 80, .30);
      border-color: #0070C0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .chart-card {
      animation: fadeIn .5s ease both;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    .chart-card {
      background-color: #ffffff;
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      box-shadow: 0 8px 20px -8px rgba(16, 48, 80, 0.18);
      padding: 1.4rem 1.8rem;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="top-accent"></div>
    <div class="top-accent-secondary"></div>
    <!-- Header -->
    <div class="flex items-start justify-between px-16 pt-10 pb-3 z-10">
      <div>
        <div class="flex items-center gap-3 mb-2">
          <div class="w-1 h-8 bg-brand-secondary"></div>
          <p class="text-3xl font-montserrat font-bold text-brand-primary uppercase tracking-tight">Tipos de
            Manifestações por Mês</p>
        </div>
        <p class="text-gray-500 font-medium ml-4 text-lg">Distribuição dos tipos de manifestação ao longo do trimestre -
          Jan / Fev / Mar de 2026</p>
      </div>
      <div class="flex items-center gap-4 ml-6">
        <span class="flex items-center gap-2 text-sm text-gray-500"><span class="legend-dot"
            style="background:#0070C0;"></span>Janeiro</span>
        <span class="flex items-center gap-2 text-sm text-gray-500"><span class="legend-dot"
            style="background:#0090C0;"></span>Fevereiro</span>
        <span class="flex items-center gap-2 text-sm text-gray-500"><span class="legend-dot"
            style="background:#103050;"></span>Março</span>
      </div>
    </div>
    <!-- Main Content -->
    <div class="flex-1 px-16 pb-10 z-10 flex">
      <div class="chart-card w-full flex flex-col">
        <div class="flex-1 relative"><canvas id="chartTiposMes"></canvas></div>
      </div>
    </div>
    <!-- Footer -->
    <div class="px-16 pb-8 flex justify-between items-center z-10">
      <p class="text-gray-400 text-xs">Relatório Trimestral 2026 · Ouvidoria da ANTAQ</p>
    </div>
  </div>
  <script>
    const labels = ['Reclamação', 'Solicitação', 'Denúncia', 'Sugestão', 'Elogio', 'Simplifique'];
    const valueLabels = {
      id: 'valueLabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        ctx.font = '700 12px Montserrat, sans-serif';
        ctx.fillStyle = '#475569';
        ctx.textAlign = 'center';
        chart.data.datasets.forEach((ds, di) => {
          chart.getDatasetMeta(di).data.forEach((bar, i) => {
            if (ds.data[i] > 0) ctx.fillText(ds.data[i], bar.x, bar.y - 6);
          });
        });
        ctx.restore();
      }
    };
    new Chart(document.getElementById('chartTiposMes'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Janeiro', data: [15, 15, 42, null, null, 1], backgroundColor: '#0070C0', borderRadius: 5, maxBarThickness: 48, skipNull: true },
          { label: 'Fevereiro', data: [9, 28, 75, 1, null, null], backgroundColor: '#0090C0', borderRadius: 5, maxBarThickness: 48, skipNull: true },
          { label: 'Março', data: [10, 2, 56, 2, 2, null], backgroundColor: '#103050', borderRadius: 5, maxBarThickness: 48, skipNull: true }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 20 } },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#374151', font: { size: 14, weight: '600' } } },
          y: { beginAtZero: true, grid: { color: '#eef2f7' }, ticks: { color: '#9ca3af', font: { size: 12 } } }
        }
      },
      plugins: [valueLabels]
    });
  </script>
  <script>document.addEventListener("keydown", function (e) { if (["ArrowRight", "ArrowLeft", "PageDown", "PageUp", "Home", "End", " ", "f", "F"].indexOf(e.key) !== -1) { e.preventDefault(); window.parent.postMessage({ type: "slide-nav", key: e.key }, "*"); } });</script>
</body>

</html>
