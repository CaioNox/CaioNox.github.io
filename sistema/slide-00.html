<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  SLIDE 00 — Capa de abertura                                ║
  ║  1º Relatório Trimestral de 2026 — ANTAQ                    ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1º Relatório Trimestral 2026 — ANTAQ</title>
  <link rel="icon" type="image/png"
    href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, #071A2E 0%, #0C2D50 45%, #103C6B 100%);
      overflow: hidden;
    }

    /* ── Elementos decorativos ── */
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: #0090C0;
      z-index: 5;
    }

    .accent-bar-thin {
      position: absolute;
      left: 6px;
      top: 0;
      width: 2px;
      height: 100%;
      background: #0070C0;
      z-index: 5;
    }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    .deco-circle-1 {
      width: 70vw;
      height: 70vw;
      border: 1px solid rgba(0, 144, 192, 0.08);
      right: -20vw;
      top: -15vw;
    }

    .deco-circle-2 {
      width: 45vw;
      height: 45vw;
      border: 1px solid rgba(0, 144, 192, 0.06);
      right: -8vw;
      top: 2vw;
    }

    .deco-circle-3 {
      width: 20vw;
      height: 20vw;
      background: rgba(0, 144, 192, 0.04);
      bottom: -6vw;
      left: 10vw;
    }

    .watermark {
      position: absolute;
      right: -4vw;
      top: 50%;
      transform: translateY(-50%);
      width: 48vw;
      opacity: 0.055;
      filter: brightness(0) invert(1);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Conteúdo ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 6vw;
      animation: fadeIn .8s ease both;
    }

    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.4rem;
      margin-bottom: 3rem;
      animation: fadeInDown .7s ease .1s both;
    }

    .logos img {
      display: block;
    }

    .logo-antaq {
      height: 72px;
      width: auto;
    }

    .logo-sep {
      width: 1px;
      height: 60px;
      background: rgba(255, 255, 255, 0.22);
    }

    .logo-ouvidoria {
      height: 56px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .eyebrow {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: #0090C0;
      margin-bottom: 1rem;
      animation: fadeInDown .7s ease .2s both;
    }

    .main-title {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -1px;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
      animation: fadeInDown .7s ease .3s both;
    }

    .main-title .accent {
      color: #0090C0;
    }

    .subtitle {
      margin-top: 1.2rem;
      font-size: 1.4rem;
      font-weight: 600;
      color: #c8dff5;
      letter-spacing: .04em;
      animation: fadeInUp .7s ease .45s both;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #0090C0, rgba(0, 144, 192, 0));
      border-radius: 2px;
      margin: 1.6rem auto 0;
      animation: fadeIn .7s ease .55s both;
    }

    /* ── Badge rodapé ── */
    .badge {
      position: absolute;
      bottom: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Open Sans', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.28);
      animation: fadeIn 1s ease .8s both;
      white-space: nowrap;
    }

    /* ── Ondas ── */
    .waves {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 170px;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: -25%;
      width: 150%;
      height: 100%;
      border-radius: 43% 57% 0 0 / 60% 60% 0 0;
      transform-origin: center bottom;
    }

    .wave-1 {
      background: rgba(0, 112, 192, 0.18);
      animation: waveMove 9s ease-in-out infinite;
    }

    .wave-2 {
      background: rgba(0, 144, 192, 0.10);
      transform: scaleY(0.65) translateX(4%);
      animation: waveMove 12s ease-in-out infinite reverse;
    }

    .wave-3 {
      background: rgba(7, 26, 46, 0.55);
      transform: scaleY(0.4) translateX(-3%);
      animation: waveMove 7s ease-in-out infinite 1.5s;
    }

    /* ── Animações ── */
    @keyframes waveMove {
      0% {
        transform: translateX(0) scaleY(1);
      }

      50% {
        transform: translateX(3%) scaleY(1.06);
      }

      100% {
        transform: translateX(0) scaleY(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="slide">

    <!-- Decorativos -->
    <div class="accent-bar"></div>
    <div class="accent-bar-thin"></div>
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>
    <div class="deco-circle deco-circle-3"></div>
    <img class="watermark" src="Imagens/Logo Horizontal_Azul_S_N.png" alt="" />

    <!-- Conteúdo central -->
    <div class="content">

      <!-- Logos -->
      <div class="logos">
        <img class="logo-antaq" src="Imagens/Logo Horizontal_Branca_C_N.png" alt="Logo ANTAQ" />
        <div class="logo-sep"></div>
        <img class="logo-ouvidoria" src="Imagens/logomarca_Ouvidoria.png" alt="Ouvidoria da ANTAQ" />
      </div>

      <!-- Eyebrow -->
      <p class="eyebrow">Agência Nacional de Transportes Aquaviários</p>

      <!-- Título -->
      <h1 class="main-title">
        1º Relatório Trimestral<br />
        <span class="accent">de 2026</span>
      </h1>

      <!-- Subtítulo -->
      <p class="subtitle">Ouvidoria da ANTAQ</p>

      <div class="divider"></div>

    </div>

    <!-- Ondas -->
    <div class="waves">
      <div class="wave wave-1"></div>
      <div class="wave wave-2"></div>
      <div class="wave wave-3"></div>
    </div>

    <!-- Rodapé -->
    <p class="badge">Brasília · 2026 &nbsp;·&nbsp; 1º Trimestre · Janeiro — Março</p>

  </div>

  <script>
    function goToSlide(n) {
      window.parent.postMessage({ type: "slide-goto", slide: n }, "*");
    }
    function goToFile(file) {
      window.parent.postMessage({ type: "slide-goto-file", file: file }, "*");
    }
    document.addEventListener("keydown", function (e) {
      if (["ArrowRight", "ArrowLeft", "PageDown", "PageUp", "Home", "End", " ", "f", "F"].indexOf(e.key) !== -1) {
        e.preventDefault();
        window.parent.postMessage({ type: "slide-nav", key: e.key }, "*");
      }
    });
  </script>
</body>

</html>
