<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SAC — Seção de Apoio ao Cidadão — ANTAQ</title>
  <link rel="icon" type="image/png"
    href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    body {
      background: linear-gradient(135deg, #050e18 0%, #0a2236 40%, #0d3358 100%);
    }

    .slide {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      color: #fff;
    }

    .av1 {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 12px;
      background: #0090C0;
      z-index: 20;
    }

    .av2 {
      position: absolute;
      left: 12px;
      top: 0;
      height: 100%;
      width: 4px;
      background: #0070C0;
      z-index: 20;
    }

    .top-prog {
      position: absolute;
      top: 0;
      left: 16px;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      z-index: 25;
    }

    .top-fill {
      height: 100%;
      width: 23%;
      background: linear-gradient(90deg, #F2A900, #0090C0);
      border-radius: 0 2px 2px 0;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0, 144, 192, 0.1);
    }

    .dots {
      position: absolute;
      opacity: 0.05;
      background-image: radial-gradient(rgba(255, 255, 255, 1) 1.5px, transparent 1.5px);
      background-size: 30px 30px;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 0 60px 0 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 58%;
      flex-shrink: 0;
    }

    .kicker {
      font-size: 0.97rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #F2A900;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .kicker::before {
      content: '';
      width: 36px;
      height: 2px;
      background: #F2A900;
      flex-shrink: 0;
    }

    .s-icon {
      font-size: 3.5rem;
      margin-bottom: 1.4rem;
      filter: drop-shadow(0 0 24px rgba(0, 144, 192, 0.7));
    }

    .s-title {
      font-size: 5.6rem;
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: 1.4rem;
    }

    .s-title .acc {
      color: #0090C0;
      display: block;
    }

    .div {
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #F2A900, #0090C0, transparent);
      margin-bottom: 1.6rem;
    }

    .desc {
      font-family: 'Open Sans', sans-serif;
      font-size: 1.22rem;
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.65);
      max-width: 480px;
      margin-bottom: 1.4rem;
    }

    .topics {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .topic {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Open Sans', sans-serif;
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.52);
    }

    .tdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #0090C0;
      flex-shrink: 0;
    }

    .stat-pane {
      flex: 1;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .stat-icon {
      font-size: 11rem;
      background: linear-gradient(160deg, #fff 0%, rgba(255, 255, 255, 0.18) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .stat-label {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      margin-top: 1rem;
    }

    .vdiv {
      position: absolute;
      left: 58%;
      top: 10%;
      bottom: 10%;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.08) 30%, rgba(255, 255, 255, 0.08) 70%, transparent);
      z-index: 5;
    }

    .hint {
      position: absolute;
      bottom: 36px;
      right: 72px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.28);
      font-size: 0.97rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .aline {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.22);
      position: relative;
    }

    .aline::after {
      content: '';
      position: absolute;
      right: -2px;
      top: -4px;
      border-left: 8px solid rgba(255, 255, 255, 0.22);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }

    .wmark {
      position: absolute;
      right: -30px;
      bottom: -80px;
      font-size: 480px;
      color: rgba(255, 255, 255, 0.02);
      line-height: 1;
      z-index: 0;
      pointer-events: none;
    }

    .logo-wm {
      position: absolute;
      top: 36px;
      right: 60px;
      height: 44px;
      opacity: 0.10;
      filter: brightness(0) invert(1);
      pointer-events: none;
    }

    .waves {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 160px;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: -25%;
      width: 150%;
      height: 100%;
      border-radius: 43% 57% 0 0 / 60% 60% 0 0;
      transform-origin: center bottom;
    }

    .wave-1 {
      background: rgba(0, 112, 192, 0.14);
      animation: waveMove 9s ease-in-out infinite;
    }

    .wave-2 {
      background: rgba(0, 144, 192, 0.08);
      transform: scaleY(0.65) translateX(4%);
      animation: waveMove 12s ease-in-out infinite reverse;
    }

    .wave-3 {
      background: rgba(5, 14, 24, 0.5);
      transform: scaleY(0.4) translateX(-3%);
      animation: waveMove 7s ease-in-out infinite 1.5s;
    }

    @keyframes waveMove {
      0% {
        transform: translateX(0) scaleY(1);
      }

      50% {
        transform: translateX(3%) scaleY(1.06);
      }

      100% {
        transform: translateX(0) scaleY(1);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(20px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .a {
      animation: fadeInUp .55s ease both;
    }

    .ar {
      animation: fadeInLeft .7s ease both;
    }

    .d1 {
      animation-delay: .06s
    }

    .d2 {
      animation-delay: .14s
    }

    .d3 {
      animation-delay: .22s
    }

    .d4 {
      animation-delay: .30s
    }

    .d5 {
      animation-delay: .40s
    }

    @media(prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="slide">
    <div class="av1"></div>
    <div class="av2"></div>
    <div class="top-prog">
      <div class="top-fill"></div>
    </div>
    <div class="ring" style="width:700px;height:700px;right:-200px;top:-200px;"></div>
    <div class="ring" style="width:460px;height:460px;right:-80px;top:-80px;border-color:rgba(0,144,192,0.16);"></div>
    <div class="ring"
      style="width:240px;height:240px;right:40px;top:40px;background:radial-gradient(circle,rgba(0,112,192,0.12) 0%,transparent 70%);border:none;">
    </div>
    <div class="dots" style="bottom:0;left:0;width:320px;height:320px;"></div>
    <img class="logo-wm" src="Imagens/Logo Horizontal_Branca_C_N.png" alt="" />
    <div class="content">
      <div class="kicker a">Capítulo 4 · SAC — Seção de Apoio ao Cidadão</div>
      <div class="s-icon a d1"><i class="fas fa-headset"></i></div>
      <h1 class="s-title a d2">Seção de Apoio<span class="acc">ao Cidadão</span> - SAC</h1>
      <div class="div a d3"></div>
      <p class="desc a d4">A SAC é a porta de entrada da Ouvidoria — triando, acolhendo e direcionando cada demanda com
        qualidade e tempestividade.</p>
      <div class="topics a d5">
        <div class="topic">
          <div class="tdot"></div>Apresentação da SAC
        </div>
        <div class="topic">
          <div class="tdot"></div>Principais atividades
        </div>
        <div class="topic">
          <div class="tdot"></div>Referências e fontes de dados
        </div>
      </div>
    </div>
    <div class="vdiv"></div>
    <div class="stat-pane">
      <div class="stat-icon ar"><i class="fas fa-headset"></i></div>
      <div class="stat-label ar d2">SAC · Ouvidoria ANTAQ</div>
    </div>
    <div class="wmark"><i class="fas fa-headset"></i></div>
    <div class="waves">
      <div class="wave wave-1"></div>
      <div class="wave wave-2"></div>
      <div class="wave wave-3"></div>
    </div>
  </div>
  <script>
    document.addEventListener("keydown", function (e) {
      if (["ArrowRight", "ArrowLeft", "PageDown", "PageUp", "Home", "End", " ", "f", "F"].indexOf(e.key) !== -1) {
        e.preventDefault(); window.parent.postMessage({ type: "slide-nav", key: e.key }, "*");
      }
    });
  </script>
</body>

</html>
