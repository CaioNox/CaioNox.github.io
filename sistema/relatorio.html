<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  sistema/relatorio.html — VERSÃO PARA IMPRESSÃO / PDF          ║
  ╠══════════════════════════════════════════════════════════════╣
  ║  Renderiza TODOS os slides do deck, um por página, em modo     ║
  ║  PAISAGEM 16:9, sem margens/bordas brancas.                    ║
  ║                                                                ║
  ║  A ordem abaixo (const files) espelha o `const deck` do        ║
  ║  index.html — mantenha os dois em sincronia.                   ║
  ║                                                                ║
  ║  Para gerar o PDF sem bordas:                                  ║
  ║   • Ctrl+P  →  Destino: "Salvar como PDF"                      ║
  ║   • Layout: Paisagem   • Margens: Nenhuma                      ║
  ║   • Marque "Gráficos de segundo plano"                         ║
  ║   • Desmarque "Cabeçalhos e rodapés"                           ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório para Impressão — Ouvidoria ANTAQ</title>
  <link rel="icon" type="image/png"
    href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* Página física = 16:9 landscape → o slide preenche 100% sem bordas */
    :root {
      --page-w: 297mm;
      --page-h: 167mm;
      /* escala do canvas 1920×1080 para caber em 297mm de largura */
      --scale: 0.584646;
    }

    @page {
      size: 297mm 167mm;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #4b5563;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }

    /* Barra de ações — só na tela, some na impressão */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding: 14px 22px;
      background: #0f172a;
      color: #e5e7eb;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .3);
    }

    .toolbar h1 {
      font-size: 15px;
      font-weight: 700;
      margin: 0;
      letter-spacing: .02em;
    }

    .toolbar .hint {
      font-size: 12.5px;
      color: #94a3b8;
      line-height: 1.4;
      margin: 4px 0 0;
    }

    .toolbar .hint b {
      color: #cbd5e1;
    }

    .btn-print {
      margin-left: auto;
      border: 0;
      cursor: pointer;
      background: #0090C0;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      transition: background .2s;
    }

    .btn-print:hover {
      background: #0070C0;
    }

    /* Empilhamento das páginas na tela */
    .sheets {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 22px 0 40px;
    }

    .page {
      width: var(--page-w);
      height: var(--page-h);
      position: relative;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
    }

    /* Cada slide é renderizado no seu tamanho de projeto (1920×1080) e
       reduzido por transform para preencher exatamente a página. */
    .page iframe {
      width: 1920px;
      height: 1080px;
      border: 0;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      transform: scale(var(--scale));
      background: #fff;
    }

    @media print {

      html,
      body {
        background: #fff;
      }

      .toolbar {
        display: none !important;
      }

      .sheets {
        gap: 0;
        padding: 0;
      }

      .page {
        box-shadow: none;
        break-after: page;
        page-break-after: always;
      }

      .page:last-child {
        break-after: auto;
        page-break-after: auto;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div>
      <h1>Relatório Trimestral · Ouvidoria ANTAQ — versão para impressão</h1>
      <p class="hint">
        Ao imprimir: <b>Layout Paisagem</b> · <b>Margens: Nenhuma</b> · marque <b>Gráficos de segundo plano</b> ·
        desmarque <b>Cabeçalhos e rodapés</b>. Para PDF sem bordas, escolha <b>Salvar como PDF</b>.
      </p>
    </div>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  </div>

  <div class="sheets" id="sheets"></div>

  <script>
    /* Ordem viva dos slides — espelha o `const deck` de index.html.
       Se reordenar/adicionar slides lá, atualize esta lista. */
    const files = [
      // Abertura
      'slide-00.html', 'slide-34.html', 'slide-msg-ouvidora.html', 'slide-01.html',
      // Bloco 1 · Visão Geral das ouvidorias públicas
      'capa-bloco-1.html', 'slide-ctx-01.html', 'slide-atribuicoes-01.html', 'slide-principios-01.html', 'slide-diretrizes-01.html',
      // Bloco 2 · A Ouvidoria da ANTAQ
      'capa-bloco-2.html', 'slide-03c.html', 'slide-ouvidoria-geral.html', 'slide-25.html', 'slide-cartas-servicos.html', 'slide-canais-atend.html', 'slide-falabr-faq.html', 'slide-17b.html', 'slide-17e.html', 'slide-07.html',
      // Bloco 3 · Seção de Apoio ao Cidadão — SAC
      'capa-bloco-3.html', 'slide-sac-apres.html', 'slide-sac-ativ.html', 'slide-14.html', 'slide-canal.html', 'slide-17d.html', 'slide-04.html', 'slide-05.html', 'slide-08.html', 'slide-ctx-03.html', 'slide-11.html', 'slide-12.html',
      // Bloco 4 · STAI — Transparência e Acesso à Informação
      'capa-bloco-4.html', 'slide-4a.html', 'slide-22.html', 'slide-23.html', 'slide-18.html', 'slide-20.html', 'slide-pda.html', 'slide-21.html',
      // Bloco 5 · Considerações Finais
      'capa-bloco-5.html', 'slide-09.html', 'slide-conclusao.html',
      // Bloco 6 · Apêndice
      'capa-bloco-6.html', 'slide-31.html', 'slide-29.html', 'slide-30.html', 'slide-32.html', 'slide-35.html',
    ];

    const sheets = document.getElementById('sheets');
    files.forEach((file) => {
      const page = document.createElement('div');
      page.className = 'page';
      const frame = document.createElement('iframe');
      frame.loading = 'eager';
      frame.setAttribute('scrolling', 'no');
      frame.src = file;
      page.appendChild(frame);
      sheets.appendChild(page);
    });
  </script>
</body>

</html>
