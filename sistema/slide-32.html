<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  SLIDE 32 — Legislação — Normativas e Portarias
  ╠══════════════════════════════════════════════════════════════╣
  ║  O QUE ATUALIZAR A CADA TRIMESTRE:
  ║  Atualizar se nova normativa ou portaria for publicada
  ╚══════════════════════════════════════════════════════════════╝
-->

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Normativos e Portarias - Relatório Trimestral Ouvidoria ANTAQ</title>
    <link rel="icon" type="image/png"
        href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&amp;family=Open+Sans:ital,wght@0,400;0,600;1,400&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        html {
            font-size: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
        }

        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        .text-brand-primary {
            color: #103050;
        }

        .text-brand-secondary {
            color: #0070C0;
        }

        .bg-brand-secondary {
            background-color: #0070C0;
        }

        .top-accent {
            height: 8px;
            background-color: #103050;
            width: 100%;
        }

        .top-accent-secondary {
            height: 4px;
            background-color: #0070C0;
            width: 100%;
        }

        /* ===== Grade de quadros ===== */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 1fr;
            gap: 1rem;
        }

        .tile {
            position: relative;
            background: #fff;
            border: 2px solid #E2E8F0;
            border-radius: 15px;
            padding: 1.1rem 1.2rem;
            cursor: pointer;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: .55rem;
            box-shadow: 0 6px 16px -8px rgba(16, 48, 80, .18);
            transition: transform .25s cubic-bezier(.2, .7, .3, 1), box-shadow .25s ease, border-color .25s ease;
            animation: fadeIn .5s ease both;
            font-family: 'Open Sans', sans-serif;
        }

        .tile:nth-child(2) {
            animation-delay: .05s
        }

        .tile:nth-child(3) {
            animation-delay: .10s
        }

        .tile:nth-child(4) {
            animation-delay: .15s
        }

        .tile:nth-child(5) {
            animation-delay: .20s
        }

        .tile:nth-child(6) {
            animation-delay: .25s
        }

        .tile:nth-child(7) {
            animation-delay: .30s
        }

        .tile:nth-child(8) {
            animation-delay: .35s
        }

        .tile:hover {
            transform: translateY(-6px);
            border-color: #0070C0;
            box-shadow: 0 24px 42px -18px rgba(16, 48, 80, .34);
        }

        .tile:focus-visible {
            outline: 3px solid #0090C0;
            outline-offset: 3px;
        }

        .doc-badge {
            align-self: flex-start;
            text-align: center;
            border-radius: 11px;
            color: #fff;
            padding: .45rem .85rem;
            font-family: 'Montserrat', sans-serif;
            line-height: 1;
            transition: transform .3s ease;
        }

        .tile:hover .doc-badge {
            transform: scale(1.05);
        }

        .doc-badge .db-type {
            display: block;
            font-size: .58rem;
            font-weight: 800;
            letter-spacing: .07em;
        }

        .doc-badge .db-num {
            display: block;
            font-size: 1.05rem;
            font-weight: 900;
            margin-top: .12rem;
        }

        .db-in {
            background: linear-gradient(160deg, #0e3a66, #11598f);
        }

        .db-port {
            background: linear-gradient(160deg, #103050, #0070C0);
        }

        .db-res {
            background: linear-gradient(160deg, #0b5e7a, #0090C0);
        }

        .tile-name {
            color: #103050;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: .98rem;
            line-height: 1.16;
        }

        .tile-tag {
            color: #5b7185;
            font-size: .74rem;
            line-height: 1.28;
        }

        .tile-more {
            margin-top: auto;
            color: #0070C0;
            font-size: .7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: .35rem;
        }

        .tile:hover .tile-more {
            color: #0090C0;
        }

        .tile-full {
            display: none;
        }

        /* ===== Overlay ===== */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5vh 8vw;
            background: rgba(16, 48, 80, .5);
            backdrop-filter: blur(3px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
        }

        .overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-card {
            position: relative;
            background: #fff;
            border-radius: 22px;
            max-width: 60rem;
            width: 100%;
            max-height: 82vh;
            overflow: hidden;
            box-shadow: 0 40px 90px -30px rgba(0, 0, 0, .6);
            border-top: 7px solid #0070C0;
            transform: scale(.88) translateY(12px);
            transition: transform .34s cubic-bezier(.2, .7, .3, 1);
            display: flex;
            flex-direction: column;
        }

        .overlay.open .overlay-card {
            transform: scale(1) translateY(0);
        }

        .overlay-head {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.8rem 2.2rem 1.2rem 2.2rem;
            border-bottom: 1px solid #eef2f7;
        }

        .ov-badge {
            flex-shrink: 0;
            text-align: center;
            border-radius: 14px;
            color: #fff;
            padding: .65rem 1.1rem;
            font-family: 'Montserrat', sans-serif;
            line-height: 1;
        }

        .ov-badge .db-type {
            display: block;
            font-size: .58rem;
            font-weight: 800;
            letter-spacing: .07em;
        }

        .ov-badge .db-num {
            display: block;
            font-size: 1.2rem;
            font-weight: 900;
            margin-top: .12rem;
        }

        .ov-titles {
            min-width: 0;
        }

        .ov-title {
            color: #103050;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.32rem;
            line-height: 1.14;
        }

        .ov-sub {
            color: #0070C0;
            font-size: .9rem;
            font-weight: 600;
            margin-top: .25rem;
        }

        .overlay-body {
            padding: 1.5rem 2.2rem 2rem 2.2rem;
            overflow-y: auto;
        }

        .ov-body p {
            color: #37475a;
            font-size: 1.02rem;
            line-height: 1.62;
        }

        .ov-body p+p {
            margin-top: .9rem;
        }

        .ov-body strong {
            color: #103050;
        }

        .overlay-close {
            position: absolute;
            top: 1.1rem;
            right: 1.2rem;
            width: 2.7rem;
            height: 2.7rem;
            border-radius: 999px;
            border: none;
            background: #f0f4f8;
            color: #103050;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s ease, transform .25s ease;
            z-index: 2;
        }

        .overlay-close:hover {
            background: #0070C0;
            color: #fff;
            transform: rotate(90deg);
        }

        .hint {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            color: #0070C0;
            font-size: .8rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }

        .bg-pattern {
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 400px;
            height: 400px;
            opacity: 0.03;
            z-index: 0;
            color: #103050;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="top-accent"></div>
        <div class="top-accent-secondary"></div>
        <!-- Header -->
        <div class="flex items-center justify-between px-16 pt-9 pb-2 z-10">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-1 h-8 bg-brand-secondary"></div>
                    <p class="text-3xl font-montserrat font-bold text-brand-primary uppercase tracking-tight">Normativos
                    </p>
                </div>
                <p class="text-gray-500 font-medium ml-4 text-lg">Instruções Normativas, Portarias e Resoluções que
                    regem
                    a Ouvidoria — <span class="hint"><i class="fas fa-hand-pointer"></i> clique para ler na
                        íntegra</span></p>
            </div>
            <div class="flex items-center gap-3 opacity-80 text-brand-secondary">
                <i class="fas fa-book-open text-3xl" aria-hidden="true"></i>
                <div class="flex flex-col justify-center pl-2" style="border-left:1px solid #CBD5E1;">
                    <p class="font-montserrat font-bold text-gray-400 text-sm tracking-widest leading-none mb-1">CAPÍTULO 06</p>
                    <p class="font-montserrat font-bold text-brand-secondary text-xs tracking-tight uppercase leading-none">Apêndice</p>
                </div>
            </div>
        </div>
        <!-- Grade -->
        <div class="flex-1 px-16 pb-8 pt-2 z-10">
            <div class="tile-grid h-full">
                <!-- IN 05/2018 -->
                <button class="tile" onclick="openCard(this)" data-title="Instrução Normativa OGU/CGU nº 05/2018"
                    data-sub="Atividades das ouvidorias federais"
                    data-badge='<span class="db-type">IN OGU/CGU</span><span class="db-num">05/2018</span>'
                    data-bclass="db-in">
                    <span class="doc-badge db-in"><span class="db-type">IN OGU/CGU</span><span
                            class="db-num">05/2018</span></span>
                    <span class="tile-name">IN OGU/CGU nº 05/2018</span>
                    <span class="tile-tag">Sigilo da identidade do denunciante</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Instrução Normativa OGU/CGU nº 05/2018 - Norma básica a respeito das atividades desenvolvidas
                            no âmbito das ouvidorias federais; estabelece diretrizes para assegurar o sigilo da
                            identidade
                            do denunciante, bem como o recebimento de denúncias anônimas no âmbito da Administração
                            Pública Federal.</p>
                    </div>
                </button>
                <!-- IN 19/2018 -->
                <button class="tile" onclick="openCard(this)" data-title="Instrução Normativa CGU nº 19/2018"
                    data-sub="Recebimento exclusivo via Sistema de Ouvidoria"
                    data-badge='<span class="db-type">IN CGU</span><span class="db-num">19/2018</span>'
                    data-bclass="db-in">
                    <span class="doc-badge db-in"><span class="db-type">IN CGU</span><span
                            class="db-num">19/2018</span></span>
                    <span class="tile-name">IN CGU nº 19/2018</span>
                    <span class="tile-tag">Recebimento exclusivo de manifestações</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Instrução Normativa CGU nº 19/2018 - Estabelece regra para recebimento exclusivo de
                            manifestações de ouvidoria por meio das unidades do Sistema de Ouvidoria do Poder Executivo
                            federal.</p>
                    </div>
                </button>
                <!-- Portaria 235-DG-ANTAQ -->
                <button class="tile" onclick="openCard(this)" data-title="Portaria nº 235-DG-ANTAQ, de 02/07/2019"
                    data-sub="Ouvidoria da ANTAQ como canal único"
                    data-badge='<span class="db-type">PORT. ANTAQ</span><span class="db-num">235/2019</span>'
                    data-bclass="db-port">
                    <span class="doc-badge db-port"><span class="db-type">PORT. ANTAQ</span><span
                            class="db-num">235/2019</span></span>
                    <span class="tile-name">Portaria nº 235-DG-ANTAQ</span>
                    <span class="tile-tag">Canal único de recebimento</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Portaria nº 235-DG-ANTAQ, de 02/07/2019 - Institui a Ouvidoria da ANTAQ como canal único de
                            recebimento de todas as manifestações de que trata o art. 10 da Lei nº 13.460, de 2017.</p>
                    </div>
                </button>
                <!-- Portaria 581-CGU -->
                <button class="tile" onclick="openCard(this)" data-title="Portaria nº 581-CGU, de 9/03/2021"
                    data-sub="Competências das unidades de ouvidoria"
                    data-badge='<span class="db-type">PORT. CGU</span><span class="db-num">581/2021</span>'
                    data-bclass="db-port">
                    <span class="doc-badge db-port"><span class="db-type">PORT. CGU</span><span
                            class="db-num">581/2021</span></span>
                    <span class="tile-name">Portaria nº 581-CGU</span>
                    <span class="tile-tag">Alterada pela Portaria 3.126-CGU</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Portaria nº 581-CGU, de 9/03/2021 (Alterada pela Portaria nº 3.126-CGU, de 30/12/2021) -
                            Estabelece orientações para o exercício das competências das unidades do Sistema de
                            Ouvidoria
                            do Poder Executivo federal, instituído pelo Decreto nº 9.492, de 5 de setembro de 2018,
                            dispõe sobre o recebimento do relato de irregularidades de que trata o caput do art. 4º-A da
                            Lei nº 13.608, de 10 de janeiro de 2018, no âmbito do Poder Executivo federal, e dá outras
                            providências.</p>
                    </div>
                </button>
                <!-- Resolução 7-CGU -->
                <button class="tile" onclick="openCard(this)" data-title="Resolução nº 7-CGU, de 30/11/2021"
                    data-sub="Normas modelo para unidades de ouvidoria"
                    data-badge='<span class="db-type">RESOLUÇÃO</span><span class="db-num">07/2021</span>'
                    data-bclass="db-res">
                    <span class="doc-badge db-res"><span class="db-type">RESOLUÇÃO</span><span
                            class="db-num">07/2021</span></span>
                    <span class="tile-name">Resolução nº 7-CGU</span>
                    <span class="tile-tag">Normas modelo de ouvidoria</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Resolução nº 7-CGU, de 30/11/2021 - Aprova a Norma Modelo para Criação de Unidades de
                            Ouvidoria
                            e a Norma Modelo para Regulamentação da Atividade de Ouvidoria em Órgãos Públicos.</p>
                    </div>
                </button>
                <!-- Portaria 3.126-CGU -->
                <button class="tile" onclick="openCard(this)" data-title="Portaria nº 3.126-CGU, de 30/12/2021"
                    data-sub="Altera a Portaria nº 581/2021"
                    data-badge='<span class="db-type">PORT. CGU</span><span class="db-num">3.126/2021</span>'
                    data-bclass="db-port">
                    <span class="doc-badge db-port"><span class="db-type">PORT. CGU</span><span
                            class="db-num">3.126/2021</span></span>
                    <span class="tile-name">Portaria nº 3.126-CGU</span>
                    <span class="tile-tag">Altera a Portaria nº 581/2021</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Portaria nº 3.126-CGU, de 30/12/2021 - Altera a Portaria nº 581, de 9 de março de 2021, em
                            razão das alterações promovidas pelo Decreto nº 10.890, de 9 de dezembro de 2021, no Decreto
                            nº 9.492, de 5 de setembro de 2018, e no Decreto nº 10.153, de 3 de novembro de 2019.</p>
                    </div>
                </button>
                <!-- Portaria 11/2023/OUV -->
                <button class="tile" onclick="openCard(this)" data-title="Portaria nº 11/2023/OUV/ANTAQ"
                    data-sub="Boletim de Pessoal e Serviços — Fevereiro/2023, 3ª Ed. Extraordinária"
                    data-badge='<span class="db-type">PORT. OUV</span><span class="db-num">11/2023</span>'
                    data-bclass="db-port">
                    <span class="doc-badge db-port"><span class="db-type">PORT. OUV</span><span
                            class="db-num">11/2023</span></span>
                    <span class="tile-name">Portaria nº 11/2023/OUV/ANTAQ</span>
                    <span class="tile-tag">Relatórios gerenciais e estratégicos</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Portaria nº 11/2023/OUV/ANTAQ (Boletim de Pessoal e Serviços - Fevereiro/2023 - 3ª Edição
                            Extraordinária) - Institui, no âmbito da Ouvidoria, os relatórios gerenciais e estratégicos
                            como instrumentos de análise de informações e apresentação de propostas de aprimoramento dos
                            serviços prestados pela Agência Nacional de Transportes Aquaviários - ANTAQ</p>
                    </div>
                </button>
                <!-- Portaria 3/2025/OUV -->
                <button class="tile" onclick="openCard(this)" data-title="Portaria nº 3/2025/OUV/ANTAQ"
                    data-sub="Boletim de Pessoal e Serviços — Junho/2025, 5ª Ed. Extraordinária"
                    data-badge='<span class="db-type">PORT. OUV</span><span class="db-num">03/2025</span>'
                    data-bclass="db-port">
                    <span class="doc-badge db-port"><span class="db-type">PORT. OUV</span><span
                            class="db-num">03/2025</span></span>
                    <span class="tile-name">Portaria nº 3/2025/OUV/ANTAQ</span>
                    <span class="tile-tag">Organização e funcionamento da Ouvidoria</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Portaria nº 3/2025/OUV/ANTAQ (Boletim de Pessoal e Serviços - Junho/2025 - 5ª Edição
                            Extraordinária) - Regulamenta e estabelece as diretrizes para a organização e funcionamento
                            dos serviços da Ouvidoria da Agência Nacional de Transportes Aquaviários – ANTAQ, como
                            instância pública de controle e participação social, responsável pelo tratamento das
                            reclamações, solicitações, denúncias, sugestões e elogios relativos às políticas e aos
                            serviços públicos prestados e regulados pela ANTAQ, com vistas ao aprimoramento da gestão
                            pública e à garantia da transparência em suas ações</p>
                    </div>
                </button>
            </div>
        </div>
        <!-- Footer -->
        <div class="px-16 pb-8 flex justify-between items-center z-10">
            <p class="text-gray-400 text-xs">Relatório Trimestral 2026 · Ouvidoria da ANTAQ</p>
        </div>
        <div class="bg-pattern"><i class="fas fa-stamp text-9xl"></i></div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeCard(event)">
        <div class="overlay-card" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
            <button class="overlay-close" onclick="closeCard(event)" aria-label="Fechar"><i
                    class="fas fa-xmark"></i></button>
            <div class="overlay-head">
                <span class="ov-badge"></span>
                <span class="ov-titles">
                    <span class="ov-title block"></span>
                    <span class="ov-sub block"></span>
                </span>
            </div>
            <div class="overlay-body">
                <div class="ov-body"></div>
            </div>
        </div>
    </div>

    <script>
        var overlay = document.getElementById('overlay');
        function openCard(tile) {
            var ovb = overlay.querySelector('.ov-badge');
            ovb.className = 'ov-badge ' + (tile.dataset.bclass || 'db-port');
            ovb.innerHTML = tile.dataset.badge || '';
            overlay.querySelector('.ov-title').textContent = tile.dataset.title || '';
            overlay.querySelector('.ov-sub').textContent = tile.dataset.sub || '';
            overlay.querySelector('.ov-body').innerHTML = tile.querySelector('.tile-full').innerHTML;
            overlay.querySelector('.overlay-body').scrollTop = 0;
            overlay.classList.add('open');
        }
        function closeCard(e) { if (e) e.stopPropagation(); overlay.classList.remove('open'); }
        document.addEventListener("keydown", function (e) {
            if (e.key === 'Escape') { if (overlay.classList.contains('open')) { e.preventDefault(); closeCard(); } return; }
            if (overlay.classList.contains('open')) return;
            if (["ArrowRight", "ArrowLeft", "PageDown", "PageUp", "Home", "End", " ", "f", "F"].indexOf(e.key) !== -1) {
                e.preventDefault(); window.parent.postMessage({ type: "slide-nav", key: e.key }, "*");
            }
        });
    </script>
</body>

</html>
