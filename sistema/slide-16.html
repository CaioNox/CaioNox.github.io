<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Glossário - Relatório Trimestral Ouvidoria ANTAQ</title>
    <link rel="icon" type="image/png"
        href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&amp;family=Open+Sans:wght@400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        html { font-size: 21px; }

        body { margin: 0; padding: 0; background-color: #f3f4f6; overflow: hidden; }

        .slide-container {
            width: 100vw; height: 100vh; position: relative;
            display: flex; flex-direction: column;
            background-color: #ffffff; overflow: hidden;
            font-family: 'Open Sans', sans-serif;
        }

        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .text-brand-primary { color: #103050; }
        .text-brand-secondary { color: #0070C0; }
        .bg-brand-secondary { background-color: #0070C0; }

        .top-accent { height: 8px; background-color: #103050; width: 100%; }
        .top-accent-secondary { height: 4px; background-color: #0070C0; width: 100%; }

        /* ===== Grade de quadros ===== */
        .tile-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr; gap: 1.1rem; }

        .tile {
            position: relative; background: #fff; border: 2px solid #E2E8F0; border-radius: 16px;
            padding: 1.2rem 1.3rem; cursor: pointer; text-align: left;
            display: flex; flex-direction: column; gap: .6rem;
            box-shadow: 0 6px 16px -8px rgba(16, 48, 80, .18);
            transition: transform .25s cubic-bezier(.2, .7, .3, 1), box-shadow .25s ease, border-color .25s ease;
            animation: fadeIn .5s ease both; font-family: 'Open Sans', sans-serif;
        }
        .tile:nth-child(2) { animation-delay: .06s } .tile:nth-child(3) { animation-delay: .12s }
        .tile:nth-child(4) { animation-delay: .18s } .tile:nth-child(5) { animation-delay: .24s }
        .tile:nth-child(6) { animation-delay: .30s } .tile:nth-child(7) { animation-delay: .36s }
        .tile:hover { transform: translateY(-7px); border-color: #0070C0; box-shadow: 0 26px 46px -18px rgba(16, 48, 80, .34); }
        .tile:focus-visible { outline: 3px solid #0090C0; outline-offset: 3px; }

        .tile-ico {
            width: 3rem; height: 3rem; border-radius: 13px;
            background: linear-gradient(160deg, #103050, #0070C0); color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 1.35rem; transition: transform .3s ease;
        }
        .tile:hover .tile-ico { transform: scale(1.08) rotate(-6deg); }
        .tile-name { color: #103050; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.12rem; line-height: 1.12; }
        .tile-tag { color: #5b7185; font-size: .8rem; line-height: 1.28; }
        .tile-more { margin-top: auto; color: #0070C0; font-size: .74rem; font-weight: 700; display: inline-flex; align-items: center; gap: .4rem; }
        .tile:hover .tile-more { color: #0090C0; }
        .tile-full { display: none; }

        .tile-cta {
            grid-column: span 1; border: 2px dashed #C0E0F0; background: #f6fafe; border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem;
            color: #0070C0; text-align: center; padding: 1rem; animation: fadeIn .5s ease both; animation-delay: .42s;
        }
        .tile-cta i { font-size: 1.6rem; }
        .tile-cta span { font-size: .82rem; font-weight: 600; line-height: 1.3; }

        /* ===== Overlay (expande sobrepondo) ===== */
        .overlay {
            position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
            padding: 5vh 8vw; background: rgba(16, 48, 80, .5); backdrop-filter: blur(3px);
            opacity: 0; pointer-events: none; transition: opacity .3s ease;
        }
        .overlay.open { opacity: 1; pointer-events: auto; }
        .overlay-card {
            position: relative; background: #fff; border-radius: 22px; max-width: 58rem; width: 100%; max-height: 82vh; overflow: hidden;
            box-shadow: 0 40px 90px -30px rgba(0, 0, 0, .6); border-top: 7px solid #0070C0;
            transform: scale(.88) translateY(12px); transition: transform .34s cubic-bezier(.2, .7, .3, 1);
            display: flex; flex-direction: column;
        }
        .overlay.open .overlay-card { transform: scale(1) translateY(0); }
        .overlay-head { display: flex; align-items: center; gap: 1.2rem; padding: 1.8rem 2.2rem 1.2rem 2.2rem; border-bottom: 1px solid #eef2f7; }
        .ov-ico { flex-shrink: 0; width: 3.8rem; height: 3.8rem; border-radius: 15px; background: linear-gradient(160deg, #103050, #0070C0); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; }
        .ov-titles { min-width: 0; }
        .ov-title { color: #103050; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.55rem; line-height: 1.1; }
        .ov-sub { color: #0070C0; font-size: .92rem; font-weight: 600; margin-top: .25rem; }
        .overlay-body { padding: 1.5rem 2.2rem 2rem 2.2rem; overflow-y: auto; }
        .ov-body p { color: #37475a; font-size: 1.02rem; line-height: 1.62; }
        .ov-body p + p { margin-top: .9rem; }
        .ov-body strong { color: #103050; }
        .ov-focus { display: flex; gap: .7rem; align-items: flex-start; margin-top: 1.1rem; background: #EAF3FB; border: 1px solid #C0E0F0; border-left: 4px solid #0070C0; border-radius: 12px; padding: .9rem 1.1rem; }
        .ov-focus i { color: #0070C0; margin-top: .2rem; }
        .ov-focus span { color: #103050; font-size: .95rem; line-height: 1.45; }
        .overlay-close { position: absolute; top: 1.1rem; right: 1.2rem; width: 2.7rem; height: 2.7rem; border-radius: 999px; border: none; background: #f0f4f8; color: #103050; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s ease, transform .25s ease; z-index: 2; }
        .overlay-close:hover { background: #0070C0; color: #fff; transform: rotate(90deg); }

        .hint { display: inline-flex; align-items: center; gap: .5rem; color: #0070C0; font-size: .8rem; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
        .bg-pattern { position: absolute; bottom: -50px; right: -50px; width: 400px; height: 400px; opacity: 0.03; z-index: 0; color: #103050; }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="top-accent"></div>
        <div class="top-accent-secondary"></div>
        <!-- Header -->
        <div class="flex items-center justify-between px-16 pt-10 pb-3 z-10">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-1 h-8 bg-brand-secondary"></div>
                    <p class="text-3xl font-montserrat font-bold text-brand-primary uppercase tracking-tight">Glossário
                    </p>
                </div>
                <p class="text-gray-500 font-medium ml-4 text-lg">Tipos de manifestação e instrumentos da Ouvidoria —
                    <span class="hint"><i class="fas fa-hand-pointer"></i> clique em um quadro para ampliar</span></p>
            </div>
            <div class="flex items-center gap-2 opacity-80 text-brand-secondary">
                <i class="fas fa-book text-xl" aria-hidden="true"></i>
                <p class="font-montserrat font-bold text-gray-400 text-sm tracking-widest">DEFINIÇÕES</p>
            </div>
        </div>
        <!-- Grade -->
        <div class="flex-1 px-16 pb-10 pt-3 z-10">
            <div class="tile-grid h-full">
                <!-- Carta de Serviços -->
                <button class="tile" onclick="openCard(this)" data-title="Carta de Serviços ao Usuário"
                    data-sub="Lei nº 13.460/2017" data-icon="fa-file-contract">
                    <span class="tile-ico"><i class="fas fa-file-contract"></i></span>
                    <span class="tile-name">Carta de Serviços ao Usuário</span>
                    <span class="tile-tag">Compromisso público de desempenho</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Prevista pela Lei nº 13.460/2017, é um instrumento de gestão e transparência que informa os
                            cidadãos sobre os serviços prestados pelo órgão, as formas de acessá-los, os horários de
                            atendimento, os prazos máximos de resposta e os padrões de qualidade exigidos. Funciona como
                            um compromisso público de desempenho firmado pela instituição perante a sociedade.</p>
                    </div>
                </button>
                <!-- Denúncia -->
                <button class="tile" onclick="openCard(this)" data-title="Denúncia"
                    data-sub="Comunicação de ato ilícito ou irregularidade" data-icon="fa-gavel">
                    <span class="tile-ico"><i class="fas fa-gavel"></i></span>
                    <span class="tile-name">Denúncia</span>
                    <span class="tile-tag">Indício de ilícito ou corrupção</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Comunicação de prática de ato ilícito, irregularidade ou indício de corrupção no âmbito da
                            administração pública. Envolve desvio de conduta de servidores, fraudes em licitações ou
                            descumprimento de leis.</p>
                        <div class="ov-focus"><i class="fas fa-crosshairs"></i><span>O foco da denúncia é a apuração do
                                fato punível, exigindo, se houver elementos suficientes, o encaminhamento para a área de
                                corregedoria ou fiscalização.</span></div>
                    </div>
                </button>
                <!-- Reclamação -->
                <button class="tile" onclick="openCard(this)" data-title="Reclamação"
                    data-sub="Insatisfação com o serviço ou atendimento" data-icon="fa-triangle-exclamation">
                    <span class="tile-ico"><i class="fas fa-triangle-exclamation"></i></span>
                    <span class="tile-name">Reclamação</span>
                    <span class="tile-tag">Falha, atraso ou mau atendimento</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Demonstração de insatisfação com o serviço público prestado ou com o atendimento recebido.
                            Refere-se a falhas operacionais, atrasos excessivos, mau atendimento ou ineficiência da
                            prestação estatal.</p>
                        <div class="ov-focus"><i class="fas fa-crosshairs"></i><span>O foco da reclamação é a correção do
                                problema na prestação do serviço e a resposta direta ao usuário afetado.</span></div>
                    </div>
                </button>
                <!-- Elogio -->
                <button class="tile" onclick="openCard(this)" data-title="Elogio"
                    data-sub="Reconhecimento ou satisfação com o serviço" data-icon="fa-thumbs-up">
                    <span class="tile-ico"><i class="fas fa-thumbs-up"></i></span>
                    <span class="tile-name">Elogio</span>
                    <span class="tile-tag">Indicador de boa prática</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Demonstração de reconhecimento, satisfação ou agradecimento pelo serviço público recebido ou
                            pelo atendimento prestado por determinado agente ou setor da administração pública. Serve
                            como indicador de eficiência e boa prática para a gestão interna do órgão.</p>
                    </div>
                </button>
                <!-- Solicitação -->
                <button class="tile" onclick="openCard(this)" data-title="Solicitação"
                    data-sub="Requerimento de providência ou serviço" data-icon="fa-hand-point-up">
                    <span class="tile-ico"><i class="fas fa-hand-point-up"></i></span>
                    <span class="tile-name">Solicitação</span>
                    <span class="tile-tag">Pedido de providência concreta</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>É um requerimento de adoção de uma providência concreta ou de prestação de um serviço por
                            parte da administração pública. Diferente da reclamação (que aponta uma falha), a solicitação
                            pede que o órgão execute algo a que o cidadão tem direito ou de que necessita, como uma
                            manutenção, uma emissão de documento ou uma ação operacional específica.</p>
                    </div>
                </button>
                <!-- Sugestão -->
                <button class="tile" onclick="openCard(this)" data-title="Sugestão"
                    data-sub="Proposta proativa de melhoria" data-icon="fa-lightbulb">
                    <span class="tile-ico"><i class="fas fa-lightbulb"></i></span>
                    <span class="tile-name">Sugestão</span>
                    <span class="tile-tag">Contribuição para aprimorar o serviço</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>É a apresentação de uma ideia ou proposta de melhoria para as políticas públicas, serviços ou
                            procedimentos adotados pelo órgão. Não se trata de uma demanda pessoal ou de uma queixa, mas
                            sim de uma contribuição proativa do cidadão para otimizar o funcionamento da máquina pública
                            ou tornar um processo mais eficiente.</p>
                    </div>
                </button>
                <!-- Simplifique -->
                <button class="tile" onclick="openCard(this)" data-title="Simplifique!"
                    data-sub="Decreto nº 9.094/2017 · Lei nº 13.460/2017" data-icon="fa-wand-magic-sparkles">
                    <span class="tile-ico"><i class="fas fa-wand-magic-sparkles"></i></span>
                    <span class="tile-name">Simplifique!</span>
                    <span class="tile-tag">Pedido de desburocratização</span>
                    <span class="tile-more"><i class="fas fa-up-right-and-down-left-from-center"></i> ampliar</span>
                    <div class="tile-full">
                        <p>Instituído pelo Decreto nº 9.094/2017 e integrado à Lei nº 13.460/2017, é um canal específico
                            de ouvidoria que permite ao cidadão apresentar uma solicitação de simplificação de serviços
                            públicos. É utilizado sempre que o usuário notar exigências burocráticas excessivas,
                            redundantes ou obsoletas (como a exigência de documentos que a própria administração já
                            possui). O objetivo é forçar o órgão a revisar seus processos, eliminar barreiras
                            desnecessárias e adotar o princípio da boa-fé e da eficiência.</p>
                    </div>
                </button>
                <!-- CTA preenche o 8º espaço -->
                <div class="tile-cta">
                    <i class="fas fa-hand-pointer"></i>
                    <span>Clique em qualquer quadro para ler a definição completa</span>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <div class="px-16 pb-8 flex justify-between items-center z-10">
            <p class="text-gray-400 text-xs">Relatório Trimestral 2026 · Ouvidoria da ANTAQ — 1º Trimestre (Jan–Mar)</p>
            <p class="text-gray-300 text-xs font-mono">16 / 21</p>
        </div>
        <div class="bg-pattern"><i class="fas fa-book text-9xl"></i></div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeCard(event)">
        <div class="overlay-card" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
            <button class="overlay-close" onclick="closeCard(event)" aria-label="Fechar"><i class="fas fa-xmark"></i></button>
            <div class="overlay-head">
                <span class="ov-ico"><i class="fas fa-book"></i></span>
                <span class="ov-titles">
                    <span class="ov-title block"></span>
                    <span class="ov-sub block"></span>
                </span>
            </div>
            <div class="overlay-body">
                <div class="ov-body"></div>
            </div>
        </div>
    </div>

    <script>
        var overlay = document.getElementById('overlay');
        function openCard(tile) {
            overlay.querySelector('.ov-ico').innerHTML = '<i class="fas ' + (tile.dataset.icon || 'fa-book') + '"></i>';
            overlay.querySelector('.ov-title').textContent = tile.dataset.title || '';
            overlay.querySelector('.ov-sub').textContent = tile.dataset.sub || '';
            overlay.querySelector('.ov-body').innerHTML = tile.querySelector('.tile-full').innerHTML;
            overlay.querySelector('.overlay-body').scrollTop = 0;
            overlay.classList.add('open');
        }
        function closeCard(e) { if (e) e.stopPropagation(); overlay.classList.remove('open'); }
        document.addEventListener("keydown", function (e) {
            if (e.key === 'Escape') { if (overlay.classList.contains('open')) { e.preventDefault(); closeCard(); } return; }
            if (overlay.classList.contains('open')) return;
            if (["ArrowRight", "ArrowLeft", "PageDown", "PageUp", "Home", "End", " ", "f", "F"].indexOf(e.key) !== -1) {
                e.preventDefault(); window.parent.postMessage({ type: "slide-nav", key: e.key }, "*");
            }
        });
    </script>
</body>

</html>
