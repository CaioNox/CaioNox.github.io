<!DOCTYPE html>

  ╔══════════════════════════════════════════════════════════════╗

  ║  O QUE ATUALIZAR A CADA TRIMESTRE:
  ║  Atualizar: ano/trimestre no título cover-sub; verificar goToSlide() se mudar nº de slides; adicionar animation-delay para novos itens do sumário

-->

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Apresentação Trimestral - Capa</title>
    <link rel="icon" type="image/png"
        href="https://prd-apex.antaq.gov.br/ords/r/sfc/120/files/static/v119/icons/app-icon-32.png" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&amp;family=Open+Sans:ital,wght@0,400;0,600;1,400&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        html {
            font-size: 16px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f3f4f6;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0A2236 0%, #103050 50%, #16466E 100%);
            overflow: hidden;
            color: white;
        }

        .bg-brand-secondary {
            background-color: #0070C0;
        }

        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        .font-opensans {
            font-family: 'Open Sans', sans-serif;
        }

        /* Decorative Shape */
        .shape-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 45%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
            z-index: 1;
        }

        /* ===== Cover ===== */
        .cover-year {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.4em;
            color: #0090C0;
        }

        .cover-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
            margin: 0.4rem 0 0 0;
        }

        .cover-title .accent {
            color: #0090C0;
        }

        .cover-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #cfe0f7;
            margin-top: 0.8rem;
        }

        .cover-org {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #9db9e6;
            margin-top: 0.35rem;
        }

        /* ===== Sumário ===== */
        .sumario {
            margin-top: 1.2rem;
            max-width: 960px;
        }

        .sumario-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: #0090C0;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.1rem;
        }

        .sumario-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(0, 144, 192, 0.3);
        }

        /* ===== Árvore do Sumário (multinível, estilo IDE) ===== */
        .tree {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .tree::-webkit-scrollbar { width: 8px; }
        .tree::-webkit-scrollbar-thumb { background: rgba(0, 144, 192, 0.35); border-radius: 4px; }
        .tree::-webkit-scrollbar-track { background: transparent; }

        .tree ul { list-style: none; margin: 0; padding: 0; }

        /* filhos: indentação + linha-guia; recolhidos por padrão */
        .tree li > ul {
            margin-left: 1.05rem;
            padding-left: 0.95rem;
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            display: none;
        }

        .tree li.open > ul {
            display: block;
            animation: fadeInUp .28s ease both;
        }

        /* linha (nó) */
        .tnode {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.32rem 0.55rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color .2s ease, padding-left .2s ease;
            user-select: none;
        }

        .tnode:hover {
            background: rgba(255, 255, 255, 0.06);
            padding-left: 0.85rem;
        }

        /* chevron (pai) / ponto (folha) */
        .tw-chev {
            width: 1rem;
            flex-shrink: 0;
            text-align: center;
            font-size: 0.72rem;
            color: #6f9be0;
            transition: transform .2s ease, color .2s ease;
        }

        .tree li.open > .tnode .tw-chev {
            transform: rotate(90deg);
            color: #0090C0;
        }

        .tw-chev .tw-leaf {
            font-size: 0.42rem;
            color: rgba(0, 144, 192, 0.55);
            vertical-align: middle;
        }

        /* número multinível (1 / 1.1 / 1.1.1) */
        .tw-num {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #0090C0;
            font-size: 0.8rem;
            min-width: 3rem;
            flex-shrink: 0;
            letter-spacing: 0.01em;
        }

        /* ícone do tópico (só nível 1) */
        .tw-icon {
            width: 1.35rem;
            text-align: center;
            color: #6f9be0;
            font-size: 0.92rem;
            flex-shrink: 0;
            transition: color .2s ease, transform .2s ease;
        }

        /* rótulo */
        .tw-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #eaf2fb;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color .2s ease;
        }

        /* tamanhos por nível */
        .tnode.lvl-1 .tw-label { font-size: 1.12rem; font-weight: 700; color: #ffffff; }
        .tnode.lvl-2 .tw-label { font-size: 0.96rem; }
        .tnode.lvl-3 .tw-label { font-size: 0.86rem; color: #cfe0f7; }
        .tnode.lvl-2 .tw-num,
        .tnode.lvl-3 .tw-num { color: #5AB4DC; font-weight: 700; font-size: 0.74rem; }

        .tnode:hover .tw-label { color: #0090C0; }
        .tnode:hover .tw-icon { color: #0090C0; transform: scale(1.12); }

        /* slide atual — "você está aqui" */
        .tnode.current { background: rgba(0, 144, 192, 0.16); }
        .tnode.current .tw-label { color: #ffffff; }
        .tnode.current .tw-num { color: #F2A900; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .tree {
            animation: fadeInUp .5s ease both;
        }

        .cover-title {
            transition: transform .3s ease;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="shape-bg"></div>
        <!-- Watermark logo -->
        <img src="Imagens/Logo Horizontal_Azul_S_N.png" alt="" class="absolute top-1/2"
            style="left: 80%; width: 55vw; max-width: 850px; transform: translate(-50%, -50%); opacity: 0.10; z-index: 2; pointer-events: none; filter: brightness(0) invert(1);" />
        <!-- Left Accent Borders -->
        <div class="absolute left-0 top-0 h-full w-3 z-20" style="background-color: #0090C0;"></div>
        <div class="absolute left-3 top-0 h-full w-1 bg-brand-secondary z-20"></div>
        <!-- Main Content Area -->
        <div class="relative z-10 flex flex-col justify-center h-full w-full pl-24 pr-16 font-montserrat">
            <!-- Top Header / Organization -->
            <div class="absolute top-16 left-24 flex items-center gap-6">
                <div>
                    <img src="Imagens/Logo Horizontal_Branca_C_N.png" alt="Logo ANTAQ"
                        style="height: 98px; width: auto;" />
                </div>
                <div style="border-left: 1px solid rgba(255,255,255,0.25); padding-left: 20px;">
                    <img src="Imagens/logomarca_Ouvidoria.png" alt="Ouvidoria da ANTAQ"
                        style="height: 78px; width: auto; filter: brightness(0) invert(1);" />
                </div>
            </div>

            <!-- Cover Title -->
            <div class="mt-4">
                <h1 class="cover-title">Ouvidoria <span class="accent">da ANTAQ</span></h1>
                <p class="cover-sub">Relatório Trimestral 2026</p>
                <p class="cover-org">Agência Nacional de Transportes Aquaviários — ANTAQ</p>

                <!-- ===== SUMÁRIO — árvore recolhível (lista multinível / estilo IDE) =====
                 A hierarquia (tópicos → subtópicos → slides) é definida no objeto `tree`
                 do <script> abaixo; a numeração 1 / 1.1 / 1.1.1 é gerada automaticamente.
                 Nó pai: clique expande/recolhe. Folha (slide): clique navega via goToFile
                 (robusto à ordem do array `slides` do index.html).
             ================================================== -->
                <!-- Sumário -->
                <div class="sumario">
                    <p class="sumario-label">Sumário</p>
                    <div class="tree" id="tree"></div>
                </div>
            </div>

            <!-- Footer Info -->
            <div class="absolute bottom-12 left-24 right-16 flex justify-between items-end pt-6"
                style="border-top: 1px solid rgba(255,255,255,0.15);">
                <div class="flex flex-col gap-1 text-xs text-blue-200">

                    <span class="font-semibold uppercase tracking-wider text-blue-100">Canais oficiais ANTAQ</span>
                    <div class="flex flex-wrap items-center gap-3 mt-1">

                        <a href="https://www.facebook.com/ANTAQ.oficial" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-1 hover:text-white transition-colors">

                            <i class="fa-brands fa-facebook"></i><span>Facebook</span>

                        </a>

                        <a href="https://www.instagram.com/antaq_oficial/" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-1 hover:text-white transition-colors">

                            <i class="fa-brands fa-instagram"></i><span>Instagram</span>

                        </a>

                        <a href="https://www.youtube.com/c/CanalANTAQ/" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-1 hover:text-white transition-colors">

                            <i class="fa-brands fa-youtube"></i><span>YouTube</span>

                        </a>

                        <a href="https://www.linkedin.com/company/antaq" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-1 hover:text-white transition-colors">

                            <i class="fa-brands fa-linkedin"></i><span>LinkedIn</span>

                        </a>

                        <a href="https://x.com/ANTAQ_oficial" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-1 hover:text-white transition-colors">

                            <i class="fa-brands fa-twitter"></i><span>Twitter</span>

                        </a>

                    </div>

                </div>

                <div class="flex items-center gap-3">

                    <div class="h-10 w-10 rounded-full flex items-center justify-center"
                        style="background-color: #0090C0; color: #103050;">

                        <i class="fas fa-anchor"></i>

                    </div>

                </div>
            </div>
            <!-- Large Decorative Icon (Watermark style) -->

            <div class="absolute bottom-0 right-0 text-white opacity-5 z-0"
                style="font-size: 500px; line-height: 0; transform: translate(20%, 20%);">

                <i class="fas fa-comments"></i>

            </div>

        </div>
        <script>
            function goToSlide(n) {
                window.parent.postMessage({ type: "slide-goto", slide: n }, "*");
            }
            // Navegação por NOME de arquivo — robusta à inserção/remoção de slides
            function goToFile(file) {
                window.parent.postMessage({ type: "slide-goto-file", file: file }, "*");
            }

            // ===== Árvore do Sumário (Opção A: seções como tópicos) =====
            // tópicos -> subtópicos -> slides. Manter em sincronia com o `deck`
            // de index.html. `f` = arquivo (folha navegável); sem `f` = nó pai.
            const tree = [
                { t: 'Abertura', icon: 'fa-door-open', children: [
                    { t: 'Capa de abertura', f: 'slide-00.html' },
                    { t: 'Ficha Técnica', f: 'slide-34.html' },
                    { t: 'Mensagem da Ouvidora', f: 'slide-msg-ouvidora.html' },
                    { t: 'Sumário', f: 'slide-01.html' },
                    { t: 'Sumário Executivo', f: 'slide-03b.html' },
                ] },
                { t: 'As Ouvidorias Públicas', icon: 'fa-bullhorn', children: [
                    { t: 'Capa da seção', f: 'capa-01.html' },
                    { t: 'A Ouvidoria da ANTAQ', f: 'slide-ouvidoria-geral.html' },
                    { t: 'Princípios · Diretrizes · Atribuições', f: 'slide-principios.html' },
                    { t: 'Papel Institucional da Ouvidoria', f: 'slide-03c.html' },
                ] },
                { t: 'Canais de Atendimento', icon: 'fa-tower-broadcast', children: [
                    { t: 'Capa da seção', f: 'capa-05.html' },
                    { t: 'Contexto', f: 'slide-ctx-05.html' },
                    { t: 'Manifestações por Canal', f: 'slide-canal.html' },
                ] },
                { t: 'Tipos de Manifestações', icon: 'fa-comments', children: [
                    { t: 'Tipos de Manifestações', f: 'slide-14.html' },
                ] },
                { t: 'SAC — Seção de Apoio ao Cidadão', icon: 'fa-headset', children: [
                    { t: 'Capa da seção', f: 'capa-sac.html' },
                    { t: 'Apresentação da SAC', f: 'slide-sac-apres.html' },
                    { t: 'Principais Atividades da SAC', f: 'slide-sac-ativ.html' },
                    { t: 'Referências e Fontes de Dados', f: 'slide-sac-refs.html' },
                ] },
                { t: 'STAI — Transparência e Acesso à Informação', icon: 'fa-eye', children: [
                    { t: 'Capa da seção', f: 'capa-stai.html' },
                    { t: 'Acesso à Informação (LAI)', children: [
                        { t: 'Capa — LAI', f: 'capa-06.html' },
                        { t: 'LAI · Transparência Passiva', f: 'slide-18.html' },
                        { t: 'LAI · Pedidos por Mês', f: 'slide-19.html' },
                        { t: 'Histórico de Pedidos LAI', f: 'slide-20.html' },
                    ] },
                    { t: 'Dados Abertos', children: [
                        { t: 'Capa — Dados Abertos', f: 'capa-07.html' },
                        { t: 'Plano de Dados Abertos 2026–2028', f: 'slide-pda.html' },
                        { t: 'Transparência Ativa e Dados Abertos', f: 'slide-21.html' },
                    ] },
                    { t: 'Transparência Ativa e Passiva', children: [
                        { t: 'Contexto', f: 'slide-ctx-08.html' },
                        { t: 'Transparência Ativa', f: 'slide-22.html' },
                        { t: 'Transparência Passiva', f: 'slide-23.html' },
                    ] },
                ] },
                { t: 'Carta de Serviços', icon: 'fa-file-contract', children: [
                    { t: 'Capa da seção', f: 'capa-10.html' },
                    { t: 'Contexto', f: 'slide-ctx-09.html' },
                    { t: 'Cartas de Serviço ANTAQ', f: 'slide-25.html' },
                    { t: 'Carta de Serviços — SOG', f: 'slide-26.html' },
                    { t: 'Carta de Serviços — SRG/SAF/SFC', f: 'slide-27.html' },
                ] },
                { t: 'Dados do Trimestre', icon: 'fa-chart-column', children: [
                    { t: 'Manifestações Recebidas', children: [
                        { t: 'Capa', f: 'capa-02.html' },
                        { t: 'Evolução Histórica', f: 'slide-07.html' },
                        { t: 'Manifestações no Fala.BR', f: 'slide-04.html' },
                    ] },
                    { t: 'Destaques do Trimestre', children: [
                        { t: 'Capa', f: 'capa-03.html' },
                        { t: 'Contexto', f: 'slide-ctx-03.html' },
                        { t: 'Destaques do Trimestre', f: 'slide-08.html' },
                    ] },
                    { t: 'Análise Quantitativa', children: [
                        { t: 'Capa', f: 'capa-04.html' },
                        { t: 'Contexto', f: 'slide-ctx-04.html' },
                        { t: 'Tratamento de Demandas do Fala.BR', f: 'slide-05.html' },
                        { t: 'Principais Achados do Trimestre', f: 'slide-09.html' },
                        { t: 'Inteligência da Ouvidoria', f: 'slide-10.html' },
                        { t: 'Análise Qualitativa', f: 'slide-11.html' },
                        { t: 'Riscos e Oportunidades', f: 'slide-12.html' },
                        { t: 'Recomendações Institucionais', f: 'slide-13.html' },
                        { t: 'Panorama Geral das Demandas', f: 'slide-16.html' },
                        { t: 'Ecossistema de Atendimento', f: 'slide-16b.html' },
                        { t: 'Sequência Lógica de Tramitação', f: 'slide-17b.html' },
                        { t: 'Jornada Mensal das Demandas', f: 'slide-17.html' },
                        { t: 'Fluxo Mensal — Painel Resolveu', f: 'slide-17d.html' },
                        { t: 'Perfil de Uso Fala.BR', f: 'slide-17e.html' },
                    ] },
                ] },
                { t: 'Encerramento', icon: 'fa-flag-checkered', children: [
                    { t: 'Conclusão', f: 'slide-conclusao.html' },
                    { t: 'Capa — Glossário e Legislação', f: 'capa-11.html' },
                    { t: 'Decretos', f: 'slide-31.html' },
                    { t: 'Glossário e Definições', f: 'slide-29.html' },
                    { t: 'Leis', f: 'slide-30.html' },
                    { t: 'Links Úteis', f: 'slide-35.html' },
                    { t: 'Normativas e Portarias', f: 'slide-32.html' },
                ] },
            ];

            function buildNode(node, num, level) {
                const li = document.createElement('li');
                const row = document.createElement('div');
                row.className = 'tnode lvl-' + level;
                const kids = node.children && node.children.length;

                const chev = document.createElement('span');
                chev.className = 'tw-chev';
                chev.innerHTML = kids ? '<i class="fas fa-chevron-right"></i>' : '<i class="fas fa-circle tw-leaf"></i>';
                row.appendChild(chev);

                const n = document.createElement('span');
                n.className = 'tw-num';
                n.textContent = num;
                row.appendChild(n);

                if (node.icon) {
                    const ic = document.createElement('span');
                    ic.className = 'tw-icon';
                    ic.innerHTML = '<i class="fas ' + node.icon + '"></i>';
                    row.appendChild(ic);
                }

                const lab = document.createElement('span');
                lab.className = 'tw-label';
                lab.textContent = node.t;
                row.appendChild(lab);

                li.appendChild(row);

                if (kids) {
                    const ul = document.createElement('ul');
                    node.children.forEach((c, i) => ul.appendChild(buildNode(c, num + '.' + (i + 1), level + 1)));
                    li.appendChild(ul);
                    row.addEventListener('click', () => li.classList.toggle('open'));
                } else if (node.f) {
                    row.classList.add('leaf');
                    row.addEventListener('click', () => goToFile(node.f));
                    if (node.f === 'slide-01.html') row.classList.add('current');
                }
                return li;
            }

            (function renderTree() {
                const root = document.getElementById('tree');
                if (!root) return;
                const ul = document.createElement('ul');
                tree.forEach((node, i) => ul.appendChild(buildNode(node, String(i + 1), 1)));
                root.appendChild(ul);
                // abre o ramo do slide atual e destaca ("você está aqui")
                const cur = root.querySelector('.tnode.current');
                if (cur) {
                    let li = cur.closest('li');
                    while (li) { li.classList.add('open'); const p = li.parentElement; li = p ? p.closest('li') : null; }
                }
            })();

            document.addEventListener("keydown", function (e) { if (["ArrowRight", "ArrowLeft", "PageDown", "PageUp", "Home", "End", " ", "f", "F"].indexOf(e.key) !== -1) { e.preventDefault(); window.parent.postMessage({ type: "slide-nav", key: e.key }, "*"); } });
        </script>
</body>

</html>
